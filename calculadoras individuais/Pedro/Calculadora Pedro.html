<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sensor Ultrassônico - Análise de Silo</title>
</head>
<body>

<h2>Análise de Volume por Sensor Ultrassônico</h2>

<div>
    <label>Altura total do silo (m):</label><br>
    <input type="number" id="altura_silo" placeholder="Ex: 10"><br><br>

    <label>Diâmetro do silo (m):</label><br>
    <input type="number" id="diametro" placeholder="Ex: 4.5"><br><br>

    <label>Leitura inicial do sensor - distância ao grão (m):</label><br>
    <input type="number" id="leitura_inicial" placeholder="Ex: 2.0"><br><br>

    <label>Leitura atual do sensor - distância ao grão (m):</label><br>
    <input type="number" id="leitura_atual" placeholder="Ex: 4.5"><br><br>

    <label>Dias entre as leituras:</label><br>
    <input type="number" id="dias" placeholder="Ex: 30"><br><br>

    <button onclick="calcular()">Calcular</button>
</div>

<div id="resultado"></div>

<script>
    function calcular() {
        let altura_silo     = Number(altura_silo.value);
        let diametro        = Number(diametro.value);
        let leitura_inicial = Number(leitura_inicial.value);
        let leitura_atual   = Number(leitura_atual.value);
        let dias            = Number(dias.value);

        if (!altura_silo || !diametro || !leitura_inicial || !leitura_atual || !dias) {
            alert("Preencha todos os campos.");
        } else if (leitura_inicial > altura_silo || leitura_atual > altura_silo) {
            alert("Leitura do sensor não pode ser maior que a altura do silo.");
        } else {
            let raio            = diametro / 2;
            let area_base       = 3.14159 * raio * raio;
            let volume_total    = area_base * altura_silo;

            let altura_grao_inicial = altura_silo - leitura_inicial;
            let altura_grao_atual   = altura_silo - leitura_atual;

            let volume_inicial  = area_base * altura_grao_inicial;
            let volume_atual    = area_base * altura_grao_atual;
            let variacao_volume = volume_atual - volume_inicial;

            let taxa_dia        = variacao_volume / dias;

            let tipo = "entrada";
            if (variacao_volume < 0) {
                tipo = "consumo";
            }

            let sinal = "";
            if (variacao_volume > 0) {
                sinal = "+";
            }

            resultado.innerHTML =
                "<hr>" +
                "<b>Geometria do Silo:</b><br>" +
                "Área da base: " + area_base.toFixed(2) + " m²<br>" +
                "Volume total: " + volume_total.toFixed(2) + " m³" +

                "<hr>" +
                "<b>Leitura Inicial:</b><br>" +
                "Distância sensor → grão: " + leitura_inicial.toFixed(2) + " m<br>" +
                "Altura do grão: " + altura_grao_inicial.toFixed(2) + " m<br>" +
                "Volume ocupado: " + volume_inicial.toFixed(2) + " m³" +

                "<hr>" +
                "<b>Leitura Atual:</b><br>" +
                "Distância sensor → grão: " + leitura_atual.toFixed(2) + " m<br>" +
                "Altura do grão: " + altura_grao_atual.toFixed(2) + " m<br>" +
                "Volume ocupado: " + volume_atual.toFixed(2) + " m³" +

                "<hr>" +
                "<b>Variação em " + dias + " dias:</b><br>" +
                "Δ Volume: " + sinal + variacao_volume.toFixed(2) + " m³<br>" +
                "Tipo: " + tipo +

                "<hr>" +
                "<b>Taxa média diária:</b><br>" +
                taxa_dia.toFixed(3) + " m³/dia (" + tipo + ")";
        }
    }
</script>

</body>
</html>

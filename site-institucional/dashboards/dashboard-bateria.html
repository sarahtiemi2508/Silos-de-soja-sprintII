<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fontes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />

    <!-- Ícones -->
    <link rel="shortcut icon" href="/site-institucional/public/img/favicon-dark.ico"
        media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" href="/site-institucional/public/img/favicon-light.ico"
        media="(prefers-color-scheme: light)">

    <!-- CSS -->
    <link rel="stylesheet" href="/site-institucional/public/css/dashboard-bateria.css">
    <link rel="stylesheet" href="/site-institucional/public/css/menu.css">

    <!-- Chart js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- MENU -->
     <script src="/site-institucional/public/js/menu.js"></script>

    <title>Dashboard</title>
</head>

<body>
    <div id="menu_hamburger"></div>
    <script>
        fetch("/site-institucional/includes/menu/menu.html")
            .then(resposta => resposta.text())
            .then(dados => {
                document.getElementById("menu_hamburger").innerHTML = dados;
            });
    </script>

    <div id="header"></div>
    <div id="parte1">
        <div id="titulo">
            <img src="/site-institucional/public/img/imagemtitulo.svg" alt="imagemTitulo" width="50px">
            <h2 id="tituloTelaGraficosBateria">SITUAÇÃO DA BATERIA</h2>
        </div>
        <div id="informacoesP1">
            <div id="boxNiveis">
                <div id="boxNiveisSilos">
                    <div id="boxNiveisBateria">
                        <div id="nivelTotalBateria"></div>
                        <div id="nivelMediaBateria"></div>
                    </div>
                    <div id="boxMenorNivelSilos">
                        <p id="tituloMaiorMenorNivel">MAIOR E MENOR NÍVEL DOS SILOS</p>
                        <div id="graficosMaiorMenor">
                            <div class="porcentagem">90%</div>
                            <div class="SilosNivel">
                                <div id="vermelhoMaior"></div>
                            </div>
                            <div class="SilosNivel">
                                <div id="vermelhoMenor"></div>
                            </div>
                            <div class="porcentagem">10%</div>
                        </div>
                    </div>
                </div>
                <div id="situacaoNivelCadaSilo">
                    <canvas id="myChart"></canvas>
                </div>
            </div>
        </div>
        <div id="nivelPreenchimentoBateriaTempo">
            <canvas id="myChart2"></canvas>
        </div>
    </div>
</body>

<script>
    const labels = [
        'Silo 1',
        'Silo 2',
        'Silo 3',
        'Silo 4',
        'Silo 5',
        'Silo 6',
        'Silo 7',
        'Silo 8',
    ];

    let valores = [30, 29, 28, 31, 22, 23, 7, 15];

    const corBarra = valores.map(v => {
        if (v > 30) {
            return '#E33333'; // vermelho
        } else if (v > 20) {
            return '#FF7E21'; // laranja
        } else {
            return '#FFEC31'; // amarelo
        }
    }
    );

    const data = {
        labels: labels,
        datasets: [{
            label: 'Nível de Cada Silo',
            backgroundColor: corBarra,
            borderColor: corBarra,
            data: valores,
            barThickness: 50,
        },

        ]

    };

    const config = {
        type: 'bar',
        data: data,
        options: {
            scales: {
                y: {
                    min: 0,
                    max: 100
                }
            },
            plugins: {
                title: {
                    display: true,
                    text: 'SITUAÇÃO DO NÍVEL DE CADA SILO'
                }
            }
        }
    }

</script>
<script>
    const myChart = new Chart(
        document.getElementById('myChart'),
        config
    )

</script>


<script>

    const labels2 = [
        'Janeiro',
        'Fevereiro',
        'Março',
        'Abril',
        'Maio',
        'Junho',
    ];
    const data2 = {
        labels: labels2,
        datasets: [{
            label: 'Temperatura Média',
            backgroundColor: 'rgb(255, 0,0)',
            borderColor: 'rgb(255,0,0)',
            data: [22, 24, 27, 23, 20, 18],
        },
        ]
    };
    const config2 = {
        type: 'line',
        data: data2,
        options: {
            plugins: {
                title: {
                    display: true,
                    text: 'NÍVEL DE PREENCHIMENTO DA BATERIA EM RELAÇÃO AO TEMPO'
                }
            }
        }
    }

</script>
<script>
    const myChart2 = new Chart(
        document.getElementById('myChart2'),
        config2
    )

</script>

</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Icons -->
  <link rel="shortcut icon" href="../assets/icon/favicon-dark.ico" media="(prefers-color-scheme: dark)">
  <link rel="shortcut icon" href="../assets/icon/favicon-light.ico"
    media="(prefers-color-scheme: light)">


    <title>Simulador Financeiro</title>
    <link rel="stylesheet" href="./css/calculadora-financeira.css" />
    <link rel="stylesheet" href="./css/header-footer.css" />

  </head>
  <body>
    <div id="header"></div>

  <script>
    fetch("./includes/header.html")
      .then(resposta => resposta.text())
      .then(dados => {
        document.getElementById("header").innerHTML = dados;
      });
  </script>

    <div class="container-financeiro">
      <div class="circulo-fundo1"></div>
      <div class="circulo-fundo2"></div>
      <div class="circulo-fundo3"></div>
      <div class="form-simulador-financeiro font-geral">
        <p>Simulação Financeira</p>
        <h1>
          Simule como os dados poderiam ser acessiveis e de facil visualizacao
        </h1>

        <div id="div_geral" class="ipt-simulador-financeiro">
          <input
            type="text"
            id="altura_silo"
            placeholder="Altura do silo (m):"
          />
          <input type="text" id="raio_silo" placeholder="Raio do silo (m):" />
          <input
            type="text"
            id="quantidade_silo"
            placeholder="Quantidade de silos na bateria:"
          />
          <input
            type="text"
            id="preco_saca_soja"
            placeholder="Preço da saca (R$):"
          />
          <input
            type="text"
            id="volume_medio"
            placeholder="Volume médio de ocupação por silo (%):"
          />
        </div>
        <button id="botao_geral" onclick="calcular()">CALCULAR</button>
      </div>
    </div>
  </body>
  <script>
    function calcular() {
      let altura_s = Number(altura_silo.value);
      let raio_s = Number(raio_silo.value);
      let qtd_s = Number(quantidade_silo.value);
      let preco_saca = Number(preco_saca_soja.value);
      let volume_m = Number(volume_medio.value);

      if (
        altura_s <= 0 ||
        raio_s <= 0 ||
        qtd_s <= 0 ||
        preco_saca <= 0 ||
        volume_m < 0
      ) {
        alert("Preencha todos os campos com valores válidos!");
        return;
      }

      // volume (m³)
      let volume_silo = Math.PI * (raio_s * raio_s) * altura_s;
      let volume_bateria = volume_silo * qtd_s;

      // conversão para kg
      let volume_total_k = volume_bateria * 750;

      // limites
      let min_k = volume_total_k * 0.15;
      let max_k = volume_total_k * 0.85;

      // ocupação atual
      let volume_ocupado = volume_total_k * (volume_m / 100);

      // recomendações (sem negativo)
      let volume_vender = Math.max(0, volume_ocupado - max_k);
      let volume_encher = Math.max(0, min_k - volume_ocupado);

      // financeiro
      let sacas = volume_ocupado / 60;
      let valor_total = sacas * preco_saca;

      let status = ``;

      if (volume_ocupado > max_k) {
        status = `🔴 EXCESSO DE ESTOQUE`;
      } else if (volume_ocupado < min_k) {
        status = `🟡 ESTOQUE BAIXO`;
      } else {
        status = `🟢 ESTOQUE NORMAL`;
      }

      div_geral.innerHTML = `
<div class='mensagem'>
    <div>
        <b>RELATÓRIO DO SILO</b><br>

        ▷ Capacidade total da bateria: ${volume_total_k.toFixed(2)} Kg<br>
        ▷ Ocupação atual: ${((volume_ocupado / volume_total_k) * 100).toFixed(1)}%<br>
        ▷ Estoque atual: ${volume_ocupado.toFixed(2)} Kg<br>
        ▷ Equivalente em sacas: ${sacas.toFixed(0)} sacas<br>
        ▷ Valor estimado: R$ ${valor_total.toFixed(2)}<br><br>
    </div>
    <div>
        <b>RECOMENDAÇÕES:</b><br>
        ✔ Pode vender até ${volume_vender.toFixed(2)} Kg<br>
        ✔ Pode armazenar mais ${volume_encher.toFixed(2)} Kg<br>

        ▷ Limite mínimo: ${min_k.toFixed(2)} Kg<br>
        ▷ Limite máximo: ${max_k.toFixed(2)} Kg<br><br>
    </div>
</div>
STATUS: ${status}<br><br>`;

      div_geral.innerHTML += `<i>Coletando dados, organizando informações, e disponibilizando conhecimento.
    venha ser um cliente Ceres</i>`;
    }
  </script>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icons -->
  <link rel="shortcut icon" href="../assets/icon/favicon-dark.ico" media="(prefers-color-scheme: dark)">
  <link rel="shortcut icon" href="../assets/icon/favicon-light.ico" media="(prefers-color-scheme: light)">

  <link rel="stylesheet" href="./css/cadastro-etapa1.css">
  <link rel="stylesheet" href="./css/header-footer.css">

  <title>Cadastro</title>

</head>

<body>

  <div id="header"></div>

  <script>
    fetch("./includes/header.html")
      .then(resposta => resposta.text())
      .then(dados => {
        document.getElementById("header").innerHTML = dados;
      });
  </script>


  <div class="div_tela_inteira">
    <div class="card">
      <div class="titulo">
        <span><b>CADASTRO</b></span>
      </div>

      <div class="formulario">
        <div class="coluna_esq">
          <div class="campo">
            <label>Nome: </label>
            <input type="text" id="email_inserido" class="input-login" />
          </div>

          <div class="campo">
            <label>CPF: </label>
            <input type="text" id="senha_inserida" class="input-login" />
          </div>

          <div class="campo">
            <label>Data de Nascimento: </label>
            <input type="text" id="senha_inserida" class="input-login" />
          </div>
        </div>

        <div class="coluna_dir">
          <div class="campo">
            <label>Email: </label>
            <input type="email" id="senha_inserida" class="input-login" />
          </div>

          <div class="campo">
            <label>Senha: </label>
            <input type="password" id="senha_inserida" class="input-login" />
          </div>

          <div class="campo">
            <label>Telefone: </label>
            <input type="tel" id="senha_inserida" class="input-login" />
          </div>
        </div>
      </div>

      <button class="botao-login" onclick="logar()"><b><a href="./cadastro-etapa2.html">CONTINUAR</a></b></button>
      <div class="links">
        <span>Esqueceu a senha? <b>acesse aqui</b></span>
        <span>Já tem login? <b><a href="./login.html">FAÇA LOGIN</a></b></span>
      </div>
    </div>
  </div>
</body>
<script></script>

</html>

<!--

padding - margem interior
margin - margem exterior

gap - distanciamento de diferentes conteudos dentro de uma mesma div

-->

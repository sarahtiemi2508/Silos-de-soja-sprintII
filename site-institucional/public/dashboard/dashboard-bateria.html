<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/icon/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" href="../assets/icon/favicon-light.ico" media="(prefers-color-scheme: light)">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/dashboard-bateria.css">
    <link rel="stylesheet" href="../css/menu.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />

    <script src="../js/menu.js"></script>

    <title>Dashboard</title>
</head>

<body>

    <div id="menu_hamburger"></div>
    <script>
        fetch("../includes/menu.html")
            .then(resposta => resposta.text())
            .then(dados => {
                document.getElementById("menu_hamburger").innerHTML = dados;
            });
    </script>

    <div class="titulo-pag">
        <img src="../assets/imgs/imagemtitulo.svg" alt="imagemTitulo">
        <h1>SITUAÇÃO DA BATERIA</h1>
    </div>

    <div class="campos">

        <div class="campo-silo">
            <div id="boxNiveis">
                <div id="boxNiveisSilos">
                    <div id="boxNiveisBateria">
                        <div id="nivelTotalBateria"></div>
                        <div id="nivelMediaBateria"></div>
                    </div>
                    <div id="graficosMaiorMenor">
                        <p id="tituloMaiorMenorNivel">MAIOR E MENOR NÍVEL DOS SILOS</p>
                        <div
                            style="display: flex; flex-direction: row; justify-content: space-evenly; width: 100%; background: transparent">
                            <div class="volumeSilo">
                                <p id="siloMaximo">Silo 4</p>
                                <div class="SilosNivel">
                                    <div id="vermelhoMaior"></div>
                                </div>
                                <div class="porcentagem" id="maiorSilo">31<span>%</span></div>
                            </div>
                            <div class="volumeSilo">
                                <p id="siloMinimo">Silo 7</p>
                                <div class="SilosNivel">
                                    <div id="vermelhoMenor"></div>
                                </div>
                                <div class="porcentagem" id="menorSilo">7<span>%</span></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="situacaoNivelCadaSilo">
                    <canvas id="myChart"></canvas>
                </div>
            </div>
        </div>

        <div class="campo-grafico">
            <canvas id="myChart2"></canvas>
        </div>

    </div>
</body>

<script>
    const labels = ["Silo 1", "Silo 2", "Silo 3", "Silo 4", "Silo 5", "Silo 6", "Silo 7", "Silo 8"];

    let valores = [33, 19, 56, 82, 76, 44, 12, 92];

    let totalValores = 0;

    for (let i = 0; i < valores.length; i++) {
        totalValores += valores[i];
    }

    let mediaValores = totalValores / valores.length;

    let maiorValor = valores[0];
    let menorValor = valores[0];

    for (let i = 1; i < valores.length; i++) {
        if (valores[i] > maiorValor) {
            maiorValor = valores[i];
        }
        if (valores[i] < menorValor) {
            menorValor = valores[i];
        }
    }

    let indexMaior = 0;
    let indexMenor = 0;

    for (let i = 1; i < valores.length; i++) {
        if (valores[i] > valores[indexMaior]) {
            indexMaior = i;
        }
        if (valores[i] < valores[indexMenor]) {
            indexMenor = i;
        }
    }

    const porcentagemSiloMaior = document.getElementById("maiorSilo");
    const porcentagemSiloMenor = document.getElementById("menorSilo");
    const nomeSiloMaximo = document.getElementById("siloMaximo");
    const nomeSiloMinimo = document.getElementById("siloMinimo");

    porcentagemSiloMaior.innerHTML = `${maiorValor}<span>%</span>`;
    porcentagemSiloMenor.innerHTML = `${menorValor}<span>%</span>`;
    nomeSiloMaximo.innerText = `${labels[indexMaior]}`;
    nomeSiloMinimo.innerText = `${labels[indexMenor]}`;

    const barraMaior = document.getElementById("vermelhoMaior");
    const barraMenor = document.getElementById("vermelhoMenor");

    barraMaior.style.height = (maiorValor / 100) * 80 + "%";
    barraMenor.style.height = (menorValor / 100) * 80 + "%";

    const totalBateria = document.getElementById("nivelTotalBateria");
    const mediaBateria = document.getElementById("nivelMediaBateria");

    totalBateria.innerHTML = `<p>Volume Total da Bateria</p><p>${totalValores}<span>m³</span></p>`;
    mediaBateria.innerHTML = `<p>Média de Ocupação</p><p>${mediaValores.toFixed(1)}<span>m³</span></p>`;



    const Criticos = valores.map((v) => {

        return v <= 15 || v >= 85 ? v : null;
    })
    const Moderado = valores.map((v) => {

        return (v <= 25 || v >= 75) && v > 15 && v < 85 ? v : null;
    })
    const Estavel = valores.map((v) => {

        return (v >= 26 && v <= 74) ? v : null;
    })



    console.log(valores)
    console.log(Criticos)

    const data = {
        labels: labels,
        datasets: [
            {
                label: "Crítico",
                backgroundColor: "rgb(227, 51, 51)",
                borderColor: "rgb(227, 51, 51)",
                data: Criticos,
                barThickness: 50,
                borderRadius: 5,
            },
            {
                label: "Moderado",
                backgroundColor: "rgb(255, 126, 33)",
                borderColor: "rgb(255, 126, 33)",
                data: Moderado,
                barThickness: 50,
                borderRadius: 5,
            },
            {
                label: "Estável",
                backgroundColor: "rgb(255, 236, 49)",
                borderColor: "rgb(255, 236, 49)",
                data: Estavel,
                barThickness: 50,
                borderRadius: 5,
            },
        ],
    };

    const config = {
        type: "bar",
        data: data,
        options: {
            maintainAspectRatio: false, // PERMITE QUE O GRÁFICO ESTIQUE NA VERTICAL
            responsive: true,
            scales: {
                y: {
                    min: 0,
                    max: 100,
                    stacked: true

                },
                x: {
                    stacked: true,
                    offset: true
                }

            },
            plugins: {
                title: {
                    display: true,
                    text: "SITUAÇÃO DO NÍVEL DE CADA SILO",
                },
            },
        },
    };
</script>
<script>
    const myChart = new Chart(document.getElementById("myChart"), config);
</script>

<script>
    const labels2 = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

    const data2 = {
        labels: labels2,
        datasets: [
            {
                label: "Nível de Preenchimento",
                backgroundColor: "rgb(255, 0, 0)",
                borderColor: "rgb(255, 0, 0)",
                data: [22, 40, 35, 50, 20, 15, 30, 45, 60, 55, 70, 80],
                tension: 0.3,
            },
        ],
    };

    const config2 = {
        type: "line",
        data: data2,
        options: {
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100,
                },
            },
            plugins: {
                title: {
                    display: true,
                    text: "NÍVEL DE PREENCHIMENTO DA BATERIA EM RELAÇÃO AO TEMPO",
                },
            },
        },
    };
</script>
<script>
    const myChart2 = new Chart(document.getElementById("myChart2"), config2);
</script>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/dashboard-individual.css">
    <link rel="stylesheet" href="../css/menu.css">

    <!-- Icons -->
    <link rel="shortcut icon" href="../assets/icon/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" href="../assets/icon/favicon-light.ico" media="(prefers-color-scheme: light)">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet" />

    <script src="../js/menu.js"></script>

    <title>Dashboard</title>
</head>

<body>

    <div id="menu_hamburger"></div>
    <script>
        fetch("../includes/menu.html")
            .then(resposta => resposta.text())
            .then(dados => {
                document.getElementById("menu_hamburger").innerHTML = dados;
            });
    </script>


    <div class="titulo-pag">
        <img src="../assets/imgs/siloicon.svg" alt="icone de silo">
        <h1>SITUAÇÃO DO SILO</h1>
    </div>

    <div class="campos">
        <div class="campo-silo">
            <div class="alinhamento-campo-silo">

                <div class="cards-kpi">
                    <div class="kpi-live">
                        <span>Espaço livre para armazenamento</span>
                        <h3>450 m³</h3>
                        <h4>16% livre</h4>
                    </div>

                    <div class="kpi-ultima-leitura">
                        <span> <strong>Última leitura</strong> ocorreu há:</span>
                        <h3>45 seg</h3>
                        <h4>28/04/2026</h4>
                        <p>10:12:05</p>
                    </div>
                </div>

                <div class="controle-silo-bateria">
                    <div class="fazenda">Fazenda XPTO</div>
                    <span>SILOS DA BATERIA</span>
                    <p>Bateria atual: 67</p>

                    <div class="bateria-grid">
                        <button class="btn-silo active">1</button>
                        <button class="btn-silo">2</button>
                        <button class="btn-silo">3</button>
                        <button class="btn-silo">4</button>
                        <button class="btn-silo">5</button>
                        <button class="btn-silo">6</button>
                        <button class="btn-silo">7</button>
                        <button class="btn-silo">8</button>
                    </div>

                    <a href="../dashboard/dashboard-bateria.html" class="link-bateria">VER SITUAÇÃO DA BATERIA
                        <span>&rarr;</span></a>
                </div>



                <div class="silo-container">
                    <img src="../assets/imgs/silosvg.svg" class="silo-overlay">

                    <div class="silo-zona-enchimento">
                        <div id="silo-preenchimento" class="silo-barra"></div>
                    </div>
                </div>

                <div class="cards-kpi">
                    <div class="kpi-status">
                        <span>Estado do silo</span>
                        <div class="estado">
                            <h3 style="color: #FFBA00;">MODERADO</h3>
                        </div>
                        <h4 id="id_silo_mais"></span></h4>
                    </div>
                    <div class="kpi-tempo-alerta">
                        <span>Tempo em alerta</span>
                        <h3>0D 1h 7m</h3>
                    </div>
                </div>

            </div>


        </div>

        <div class="campo-grafico" style="position: relative; width: 90vw; height: 400px;">
            <canvas id="graficoSiloMocado"></canvas>
        </div>

    </div>

    <script>
        // Lógica dos botões
        const botoes = document.querySelectorAll('.btn-silo');
        for (let i = 0; i < botoes.length; i++) {
            botoes[i].addEventListener('click', function () {
                for (let j = 0; j < botoes.length; j++) {
                    botoes[j].className = 'btn-silo';
                }
                botoes[i].className = 'btn-silo active';
            });
        }

        // Lógica para fazer os botões pegarem a cor do stts do silo
        // Criação do JSON de silos
        let silos = [
            {
                'nome': 'Silo1',
                'numero': 1,
                'porcentagem': 84
            }, {
                'nome': 'Silo2',
                'numero': 2,
                'porcentagem': 19
            }, {
                'nome': 'Silo3',
                'numero': 3,
                'porcentagem': 56
            }, {
                'nome': 'Silo4',
                'numero': 4,
                'porcentagem': 82
            }, {
                'nome': 'Silo5',
                'numero': 5,
                'porcentagem': 76
            }, {
                'nome': 'Silo6',
                'numero': 6,
                'porcentagem': 44
            }, {
                'nome': 'Silo7',
                'numero': 7,
                'porcentagem': 12
            }, {
                'nome': 'Silo8',
                'numero': 8,
                'porcentagem': 92
            }
        ]

        // Criação da variável que pega todos os botões do silo
        let botoes_silos = document.querySelectorAll('.btn-silo');

        // For que verifica a % do silo e muda o fundo de acordo

        for (let i = 0; i < botoes_silos.length; i++) {

            if (silos[i].porcentagem >= 30 && silos[i].porcentagem <= 70) {

                botoes_silos[i].id = 'estavel';

            } else if (silos[i].porcentagem < 15 || silos[i].porcentagem > 85) {

                botoes_silos[i].id = 'critico';

            } else {

                botoes_silos[i].id = 'moderado';
            }
        }

        // Lógica para recomendação de escoamento
        let silo_mais_vazio = silos[0];
        let silo_mais_cheio = silos[0];

        // Acha o silo mais vazio
        for (let i = 0; i < silos.length; i++) {

            if (silos[i].porcentagem < silo_mais_vazio.porcentagem) {
                silo_mais_vazio = silos[i]
            }

        }

        // Acha o silo mais cheio
        for (let i = 0; i < silos.length; i++) {

            if (silos[i].porcentagem > silo_mais_cheio.porcentagem) {
                silo_mais_cheio = silos[i]
            }

        }

        // For que recomenda escoamento ou enchimento 
        for (let i = 0; i < silos.length; i++) {
            if (silos[0].porcentagem > 70) {
                id_silo_mais.innerHTML = `Escoar para ${silo_mais_vazio.nome}`;
            } else if (silos[0].porcentagem < 25) {
                id_silo_mais.innerHTML = `Preencher a partir de ${silo_mais_cheio.nome}`;
            }
        }

        // Lógica da barra

        const barraSilo = document.getElementById('silo-preenchimento');
        barraSilo.style.height = `84%`;
        barraSilo.style.backgroundColor = '#FFBA00';

        // Gráfico mocado
        const contextoGrafico = document.getElementById('graficoSiloMocado').getContext('2d');
        const graficoLinha = new Chart(contextoGrafico, {
            type: 'line',
            data: {
                // Horários fakes
                labels: ['07:00', '07:30', '08:00', '08:30', '09:00', '09:30', '10:00', '10:30', '11:00', 'Agora'],
                datasets: [{
                    label: 'Nível de preenchimento do silo (%)',
                    borderColor: '#FFBA00',
                    backgroundColor: 'rgba(255, 186, 0, 0.2)',
                    borderWidth: 3,
                    fill: true,
                    // Simular nível subindo
                    data: [45, 50, 58, 63, 68, 72, 76, 80, 82, 84]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        beginAtZero: true
                    },
                    y: {
                        beginAtZero: true,
                        max: 100,
                        title: { display: true, text: 'Preenchimento (%)' }
                    }
                },
                plugins: {
                    title: {
                        display: true,
                        text: "NÍVEL DE PREENCHIMENTO DO SILO EM RELAÇÃO AO TEMPO",
                    },
                },
            }
        });
    </script>

</body>

</html>

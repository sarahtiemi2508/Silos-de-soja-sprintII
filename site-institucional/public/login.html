<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Icons -->
  <link rel="shortcut icon" href="../assets/icon/favicon-dark.ico" media="(prefers-color-scheme: dark)">
  <link rel="shortcut icon" href="../assets/icon/favicon-light.ico"
    media="(prefers-color-scheme: light)">

  <link rel="stylesheet" href="./css/login.css">
  <link rel="stylesheet" href="./css/header-footer.css">

  <title>Login</title>

</head>

<body>


  <div id="header"></div>



<script>
fetch("./includes/header.html")
  .then(resposta => resposta.text())
  .then(dados => {
    document.getElementById("header").innerHTML = dados;
  });
</script>


  <div class="div_tela_inteira">
    <div class="card">
      <div class="titulo">
        <span><b>LOGIN</b></span>
      </div>
      <div class="campo">
        <label>Email: </label>
        <input type="email" id="email_inserido" class="input-login" />
      </div>
      <div class="campo">
        <label>Senha: </label>
        <input type="password" id="senha_inserida" class="input-login" />
      </div>
      <button class="botao-login" onclick="logar()"><b><a class="btn_link"
            href="./dashboard/alerta.html">ENTRAR</a></b></button>
      <div class="links">
        <span>Esqueceu a senha? <b>acesse aqui</b></span>
        <span>Não tem cadastro? <b><a href="./cadastro-etapa1.html">CADASTRE-SE AQUI</a></b></span>
      </div>
    </div>
  </div>
</body>


</html>


<!--

padding - margem interior
margin - margem exterior

gap - distanciamento de diferentes conteudos dentro de uma mesma div

-->

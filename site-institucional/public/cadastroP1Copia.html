<html>

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />

	<!-- Icons -->
	<link rel="shortcut icon" href="./assets/icon/favicon-dark.ico" media="(prefers-color-scheme: dark)">
	<link rel="shortcut icon" href="./assets/icon/favicon-light.ico" media="(prefers-color-scheme: light)">

	<link rel="stylesheet" href="./css/auth.css">
	<link rel="stylesheet" href="./css/header-footer.css">

	<title>Cadastro</title>
</head>

<body>
	<div id="header"></div>

	<script>
		fetch("./includes/header.html")
			.then(resposta => resposta.text())
			.then(dados => {
				document.getElementById("header").innerHTML = dados;
			});
	</script>

	<div class="div_tela_inteira">
		<div class="card">
			<div class="titulo">
				<span><b>CADASTRO</b></span>
			</div>

			<div class="formulario form-row">
				<div class="colunas">
					<div class="campo">
						<label>Nome: </label>
						<input type="text" id="nome_inserido" class="input-cadastro" />
					</div>

					<div class="campo">
						<label>CPF: </label>
						<input type="text" id="cpf_inserido" class="input-cadastro" />
					</div>

					<div class="campo">
						<label>Data de Nascimento: </label>
						<input type="date" id="data_inserida" class="input-cadastro" />
					</div>
				</div>

				<div class="colunas">
					<div class="campo">
						<label>Email: </label>
						<input type="email" id="email_inserido" class="input-cadastro" />
					</div>

					<div class="campo">
						<label>Senha: </label>
						<input type="password" id="senha_inserida" class="input-cadastro" />
					</div>

					<div class="campo">
						<label>Telefone: </label>
						<input type="tel" id="telefone_inserido" class="input-cadastro" />
					</div>
				</div>
			</div>

			<button class="botao-login btn-cad" onclick="logar()">CONTINUAR
				<!--<b><a href="Cadastro_etapa2.html">CONTINUAR</a></b>*/-->
			</button>
			<div class="links">
				<span>Esqueceu a senha? <b>acesse aqui</b></span>
				<span>Já tem login? <b><a href="./login.html">FAÇA LOGIN</a></b></span>
			</div>
		</div>
	</div>
</body>

<script>

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_inserido.value;
    var cpfVar = cpf_inserido.value;
    var dtNascVar = data_inserida.value;
    var emailVar = email_inserido.value;
    var senhaVar = senha_inserida.value;
    var telefoneVar = telefone_inserido.value;
    
    var idEmpresaVincular

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      cpfVar == "" ||
      dtNascVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      telefoneVar == ""
    ) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "(Mensagem de erro para todos os campos em branco)";

      finalizarAguardar();
      return false;
    } else {
      setInterval(sumirMensagem, 5000);
    }



    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        cpfServer: cpfVar,
        dtNascServer: dtNascVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        telefoneServer: telefoneVar

        
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }

</script>

</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora - Perdas e Desvios</title>
</head>
<body>
    <h1>Economia com Prevenção de Desvios (Silos)</h1>
    
    <div>
        <p>Capacidade total do Silo (em Toneladas):</p>
        <input type="text" id="ipt_capacidade">
    </div>

    <div>
        <p>Preço médio da Tonelada (R$):</p>
        <input type="text" id="ipt_preco">
    </div>

    <br>
    <button onclick="calcularPerdas()">Calcular Prejuízo Atual</button>
    <br><br>

    <div id="div_resultado"></div>
</body>

    <script>
        function calcularPerdas() {
            let capacidade = Number(ipt_capacidade.value);
            let preco = Number(ipt_preco.value);
            
            // Calculando o valor total do silo - cheio
            let valor_total_silo = capacidade * preco;
            
            // Calculando o desvio  2%
            let taxa_perda = 0.02; 
            let prejuizo_anual = valor_total_silo * taxa_perda;

            let mensagem = `O valor total da sua carga é de R$${valor_total_silo.toFixed(2)}.<br><br>`;
            
            if (prejuizo_anual > 0) {
                mensagem += `Sem monitoramento, você pode estar perdendo até 2% do volume armazenado.<br>`;
                mensagem += `Isso representa um <b>prejuízo invisível de R$${prejuizo_anual.toFixed(2)}</b> por safra/ano.<br><br>`;
                mensagem += `Com o nosso sistema de sensores ultrassônicos, esse valor retorna para o caixa da empresa!`;
            } else {
                mensagem += `Insira valores válidos para calcular o prejuízo.`;
            }

            div_resultado.innerHTML = mensagem;
        }
    </script>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora do Emidio</title>
</head>
<body>
    <h1>Calculadora Financeira Pseudo5 LTDA.</h1><br><br>
    <span>Quantidade de Sacas</span><br>
    <input type="number" id="qtd_sacas" placeholder="Insira aqui!!"><br>
    <span>Preço da saca</span><br>
    <input type="number" id="preco_sacas" placeholder="Insira aqui!!"><br>
    <span>Percentual de perda atual</span><br>
    <input type="number" id="percentual_perda_atual" placeholder="Insira aqui!!"><br>
    <span>Percentual de perda com o sistema</span><br>
    <input type="number" id="percentual_perda_com_sistema" placeholder="Insira aqui!!"><br><br>
    <button onclick="calcular()">Calcular</button><br>

    <div id="div_mensagem"></div>

</body>
<script>
    function calcular(){
        let qtdSacas = Number(qtd_sacas.value);
        let precoSacas = Number(preco_sacas.value);
        let percentualPerdaAtual = Number(percentual_perda_atual.value);
        let percentualPerdaComSistema = Number(percentual_perda_com_sistema.value);

        let valorTotal = qtdSacas * precoSacas;
        let perdaSemSistema = valorTotal * (percentualPerdaAtual / 100);
        let perdaComSistema = valorTotal * (percentualPerdaComSistema / 100);
        let economia = perdaSemSistema - perdaComSistema;
        let sacasPerdidasSemSistema = qtdSacas * (perdaSemSistema / 100);
        let sacasPerdidasComSistema = qtdSacas * (perdaComSistema / 100);

        div_mensagem.innerHTML = `Valor total armazenado: <b>R$ ${valorTotal.toFixed(2)}</b><br>`;
        div_mensagem.innerHTML +=`Perda sem monitoramento: <b>R$ ${perdaSemSistema.toFixed(2)}</b><br>`;
        div_mensagem.innerHTML +=`Perda com monitoramento: <b>R$ ${perdaComSistema.toFixed(2)}</b><br>`;
        div_mensagem.innerHTML +=`Economia estimada: <b>R$ ${economia.toFixed(2)}</b><br>`;
        div_mensagem.innerHTML += `Sacas perdidas sem o sistema: <b>${sacasPerdidasSemSistema}</b><br>`;
        div_mensagem.innerHTML += `Sacas perdidas com o sistema: <b>${sacasPerdidasComSistema}</b><br>`;
ss

    }
</script>
</html>

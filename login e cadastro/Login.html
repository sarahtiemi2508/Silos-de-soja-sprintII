<html>
  <head>
    <style>

  body {
      margin: 0;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f0f0;
      background-image: url(imagens/background_login.svg);
      background-position: center;
      

      font-family: Arial, Helvetica, sans-serif;

      
  }

  .card {
    background-color: white;
    height: 400px;
    padding: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    width: 600px;
    border-radius: 50px;
    box-shadow: 0px 5px 15px
  rgba(0,0,0,0.2);
  }

.input-login{
  width: 450px;
  padding: 10px;
  margin: 10px 0;

  border-radius: 20px;
  border: 1px solid #ccc;

  outline: none;
}

.botao-login{
  width: 100;
  padding: 12px;
  background-color: #f4b400;
  color: black;
  border: none;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
  margin-bottom: -25;
}

.titulo{
  color: #f4b400;
  text-align: center;
  align-self: center;
  justify-self: center;
  font-size: 200%;
  padding-bottom: 60px;
  margin-top: -40px;
  font-weight: 700;
}

.campo{
  display: flex;
  flex-direction: column;
  align-items: start;
  justify-content: space-between;
}

.links {
  justify-content: center;
  align-items: center;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 60px;
  margin-bottom: -50px;
  font-size: 11;
}

    </style>
  </head>
  <body>
    <div id="div_tela_inteira">
      <div class="card">
        <div  class="titulo">
        <span><b>LOGIN</b></span>
        </div>
        <div class="campo">
          <label>Email: </label>
          <input type="email" id="email_inserido" class="input-login" />
        </div>
        <div class="campo">
          <label>Senha: </label>
          <input type="password" id="senha_inserida" class="input-login" /> <button type="button" onclick="verSenha()">👁️</button>
        </div>
        <button class="botao-login" onclick="logar()"><b>ENTRAR</b></button>
        <div class="links">
        <span>Esqueceu a senha? <b>acesse aqui</b></span>
        <span>Não tem cadastro? <b>CADASTRE-SE</b></span>
        </div>
      </div>
    </div>
  </body>
  <script>
    function verSenha() {
  var campo = senha_inserida; // pega o input direto pelo id

  if (campo.type == "password") {
    campo.type = "text";
    botao.textContent = "🙈";
  } else {
    campo.type = "password";
    botao.textContent = "👁️";
  }
}

  </script>
</html>


<!--

padding - margem interior
margin - margem exterior

gap - distanciamento de diferentes conteudos dentro de uma mesma div

-->

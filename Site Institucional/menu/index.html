<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Hambúrguer</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <button class="hamburger" onclick="toggleMenu()">
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
      <div class="logo-area">
        <img src="img/logo-crop.png" alt="Logo Ceres" class="logo" />
        <h2>MENU</h2>
      </div>

      <div class="menu-links">
        <a href="../dashboard/alerta.html" class="menu-item">
          <img src="img/alerta.png" alt="Alertas" class="icon" />
          <span>ALERTAS</span>
        </a>

        <a href="../dashboard/paginaGraficoIndividual.html" class="menu-item">
          <img src="img/individual.png" alt="Individual" class="icon" />
          <span>INDIVIDUAL</span>
        </a>

        <a href="../paginaGraficosGrupo.html" class="menu-item">
          <img src="img/bateria.png" alt="Bateria" class="icon" />
          <span>BATERIA</span>
        </a>
      </div>

      <div class="bottom-link">
        <a href="#" class="menu-item">
          <img src="img/config.png" alt="Configurações" class="icon" />
          <span>CONFIGURAÇÕES</span>
        </a>
      </div>
    </div>

    <script>
      let menuAberto = false;

      function toggleMenu() {
        let sidebar = document.getElementById("sidebar");
        let overlay = document.getElementById("overlay");

        if (menuAberto == false) {
          sidebar.style.left = "0";
          overlay.style.opacity = "1";
          overlay.style.visibility = "visible";
          menuAberto = true;
        } else {
          sidebar.style.left = "-320px";
          overlay.style.opacity = "0";
          overlay.style.visibility = "hidden";
          menuAberto = false;
        }
      }
    </script>
  </body>
</html>

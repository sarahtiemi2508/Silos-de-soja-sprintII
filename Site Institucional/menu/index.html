<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Hambúrguer</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <button class="hamburger" onclick="toggleMenu()">
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <aside class="sidebar" id="sidebar">
      <div class="logo-area">
        <img src="img/logo-crop.png" alt="Logo Ceres" class="logo" />
        <h2>MENU</h2>
      </div>

      <nav class="menu-links">
        <a href="../dashboard/alerta.html" class="menu-item">
          <img src="img/alerta.png" alt="Alertas" class="icon" />
          <span>ALERTAS</span>
        </a>

        <a href="#" class="menu-item">
          <img src="img/fazenda.png" alt="Fazendas" class="icon" />
          <span>FAZENDAS</span>
        </a>
      </nav>

      <div class="bottom-link">
        <a href="#" class="menu-item">
          <img src="img/config.png" alt="Configurações" class="icon" />
          <span>CONFIGURAÇÕES</span>
        </a>
      </div>
    </aside>

    <script src="script.js"></script>
  </body>
</html>

<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro_etapa2</title>

  <style>
    * {
      padding: 0%;
      box-sizing: border-box;
      margin: 0%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    .div_tela_inteira {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .div_tela_inteira::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url('../public/img/background_login.png');
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      filter: blur(5px);
      z-index: -1;
      transform: scale(1.1);
    }

    .card {
      margin-top: 50px;
      background-color: white;
      height: auto;
      width: 800px;
      padding: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-radius: 50px;
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
    }

    .titulo {
      color: #f4b400;
      text-align: center;
      font-size: 32px;
      padding-bottom: 40px;
      font-weight: 700;
    }

    /* 🔥 FORM CENTRAL NOVO */
    .formulario {
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .campo {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .input-login {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
    }

    .botao-login {
      width: 150px;
      padding: 10px;
      background-color: #f4b400;
      color: black;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 25px;
    }

    .links {
      justify-content: center;
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 60px;
      font-size: 11px;
    }

    .links a {
      color: #f4b400;
      text-decoration: none;
    }

  </style>
</head>

<body>

  <div id="header-auth"></div>

  <script>
    fetch("../includes/header-auth.html")
      .then(resposta => resposta.text())
      .then(dados => {
        document.getElementById("header-auth").innerHTML = dados;
      });
  </script>

  <div class="div_tela_inteira">

    <div class="card">

      <div class="titulo">
        <b>CADASTRO</b>
      </div>

      <div class="formulario">

        <div class="campo">
          <label>Nome Fantasia:</label>
          <input type="text" id="nome_fantasia_inserido" class="input-login" />
        </div>

        <div class="campo">
          <label>CNPJ:</label>
          <input type="text" id="cnpj_inserido" class="input-login" />
        </div>

        <div class="campo">
          <label>Razão Social:</label>
          <input type="text" id="razao_social_inserida" class="input-login" />
        </div>

      </div>

      <button class="botao-login" onclick="logar()"><b>CADASTRAR</b></button>

      <div class="links">
        <span>Esqueceu a senha? <b>acesse aqui</b></span>
        <span>Já tem login? <b><a href="Login.html">FAÇA LOGIN</a></b></span>
      </div>

    </div>

  </div>

</body>

<script>

  function logar() {

    let nm_fantasia = nome_fantasia_inserido.value
    let rz_social = razao_social_inserida.value
    let cnpj = cnpj_inserido.value

    if (nm_fantasia == "" || rz_social == "" || cnpj == "") {
      alert("Uma das informações necessárias para o cadastro está vazia. Verifique os campos e tente novamente");
    }
    else {
      window.location.href = "../home.html"
    }
  }

</script>

</html>

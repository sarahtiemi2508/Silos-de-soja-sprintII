<html>

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cadastro_etapa2</title>
</head>
<style>
	/* API da fonte de títulos Inter */
	@import url('https://fonts.googleapis.com/css2?&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

	/* API da fonte padrão Montserrat */
	@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap');

	:root {
		--primary-yellow: #FFBA00;
		--second-green: #00352A;
		--paragrafo: 'Montserrat', sans-serif;
		--titulo: 'Inter', sans-serif;
	}

	* {
		padding: 0%;
		box-sizing: border-box;
		margin: 0%;
	}

	body {
		font-family: var(--paragrafo);
	}

	.div_tela_inteira {
		position: relative;
		width: 100%;
		min-height: 100vh;
		display: flex;
		justify-content: center;
		align-items: center;
		overflow: hidden;
	}

	.div_tela_inteira:before {
		content: "";
		position: absolute;
		inset: 0;
		background-image: url('../public/img/background_login.png');
		background-position: center;
		background-repeat: no-repeat;
		background-size: cover;
		filter: blur(5px);
		z-index: -1;
		transform: scale(1.1);
	}

	.card {
		margin-top: 4%;
		background-color: white;
		height: 70vh;
		width: 45vw;
		padding: 2%;
		display: flex;
		justify-content: center;
		align-items: center;
		flex-direction: column;
		border-radius: 8%;
		box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
		gap: 8%;
	}

	.input-login {
		width: 30vw;
		padding: 2%;

		border-radius: 20px;
		border: 1px solid #ccc;

		outline: none;
	}

	.botao-login {
		font-family: var(--titulo);
		width: 12vw;
		padding: 2%;
		background-color: #f4b400;
		color: black;
		border: none;
		border-radius: 10vw;
		font-weight: 700;
		cursor: pointer;
		transition: all ease-in-out 0.3s;
	}

	.botao-login:hover {
		transform: scale(0.95);
		color: var(--primary-yellow);
		background-color: black;
		cursor: pointer;
	}

	.botao-login:active {
		transform: scale(1);
		color: black;
		background-color: var(--primary-yellow);
		cursor: pointer;
	}

	.titulo {
		color: #f4b400;
		text-align: center;
		align-self: center;
		justify-self: center;
		font-size: 200%;
		font-weight: 700;
		font-family: var(--titulo);
	}

	.campo {
		display: flex;
		flex-direction: column;
		align-items: start;
		justify-content: space-between;
	}

	.links {
		justify-content: center;
		align-items: center;
		display: flex;
		flex-direction: column;
		gap: 10px;
		font-size: 16px;
	}

	.links a {
		color: #f4b400;
		text-decoration: none;
		font-weight: 800;
		transition: all ease-in-out 0.3s;
	}

	.links a:hover {
		color: var(--second-green);
	}

	.formulario {
		display: flex;
		flex-direction: column;
		justify-content: center;
		gap: 5%;
	}
</style>

<body>

	<div id="header-auth"></div>

	<script>
		fetch("../includes/header-auth.html")
			.then(resposta => resposta.text())
			.then(dados => {
				document.getElementById("header-auth").innerHTML = dados;
			});
	</script>

	<div class="div_tela_inteira">

		<div class="card">

			<div class="titulo">
				<b>CADASTRO</b>
			</div>

			<div class="formulario">

				<div class="campo">
					<label>Nome Fantasia:</label>
					<input type="text" id="nome_fantasia_inserido" class="input-login" />
				</div>

				<div class="campo">
					<label>CNPJ:</label>
					<input type="text" id="cnpj_inserido" class="input-login" />
				</div>

				<div class="campo">
					<label>Razão Social:</label>
					<input type="text" id="razao_social_inserida" class="input-login" />
				</div>

			</div>

			<button class="botao-login" onclick="logar()"><b>CADASTRAR</b></button>

			<div class="links">
				<span>Esqueceu a senha? <b>acesse aqui</b></span>
				<span>Já tem login? <b><a href="Login.html">FAÇA LOGIN</a></b></span>
			</div>

		</div>

	</div>

</body>

<script>

	function logar() {

		let nm_fantasia = nome_fantasia_inserido.value
		let rz_social = razao_social_inserida.value
		let cnpj = cnpj_inserido.value

		if (nm_fantasia == "" || rz_social == "" || cnpj == "") {
			alert("Uma das informações necessárias para o cadastro está vazia. Verifique os campos e tente novamente");
		}
		else {
			window.location.href = "../home.html"
		}
	}

</script>

</html>

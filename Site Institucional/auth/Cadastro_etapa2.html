<html>
  <head>
    <style>
      body {
        margin: 0;
        height: 100vh;

        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f0f0f0;
      background-image: url('../public/img/background_login.svg');
        background-position: center;

        font-family: Arial, Helvetica, sans-serif;
      }

      .card {
        background-color: white;
        height: 400px;
        width: 800px;
        padding: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        border-radius: 50px;
        box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
      }

      .input-login {
        width: 350px;
        padding: 10px;
        margin: 10px 0;

        border-radius: 20px;
        border: 1px solid #ccc;

        outline: none;
      }

      .botao-login {
        width: 150;
        padding: 12px;
        background-color: #f4b400;
        color: black;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
        margin-bottom: -25;
      }

      .titulo {
        color: #f4b400;
        text-align: center;
        align-self: center;
        justify-self: center;
        font-size: 200%;
        padding-bottom: 60px;
        margin-top: -40px;
        font-weight: 700;
      }

      .campo {
        display: flex;
        flex-direction: column;
        align-items: start;
        justify-content: space-between;
      }

      .links {
        justify-content: center;
        align-items: center;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 60px;
        margin-bottom: -50px;
        font-size: 11;
      }
      
       .links a{
        color: #f4b400;
        text-decoration: none;
      }

      .formulario {
        display: flex;
        flex-direction: row;
        gap: 80px;
      }

      .coluna_esq {
        align-items: start;
      }

      .column_dir {
        align-items: end;
      }
    </style>
  </head>
  <body>
    <div id="div_tela_inteira">
      <div class="card">
        <div class="titulo">
          <span><b>CADASTRO</b></span>
        </div>

        <div class="formulario">
          <div class="coluna_esq">
            <div class="campo">
              <label>Nome Fantasia: </label>
              <input type="text" id="email_inserido" class="input-login" />
            </div>

            <div class="campo">
              <label>CNPJ: </label>
              <input type="text" id="senha_inserida" class="input-login" />
            </div>
          </div>

          <div class="coluna_dir">
            <div class="campo">
              <label>Razão Social: </label>
              <input type="email" id="senha_inserida" class="input-login" />
            </div>

            <div class="campo">
              <label>Data de Cadastro: </label>
              <input type="date" id="senha_inserida" class="input-login" />
            </div>
          </div>
        </div>

        <button class="botao-login" onclick="logar()"><b>CADASTRAR</b></button>
        <div class="links">
          <span>Esqueceu a senha? <b>acesse aqui</b></span>
          <span>Já tem login? <b><a href="Login.html">FAÇA LOGIN</a></b></span>
        </div>
      </div>
    </div>
  </body>
  <script></script>
</html>

<!--

padding - margem interior
margin - margem exterior

gap - distanciamento de diferentes conteudos dentro de uma mesma div

-->

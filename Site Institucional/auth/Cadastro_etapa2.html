<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro_etapa2</title>



  <style>
 * {
      padding: 0%;
      box-sizing: border-box;
      margin: 0%;
    }

    body {

      font-family: Arial, Helvetica, sans-serif;
    }



    .div_tela_inteira {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;


    }

    .div_tela_inteira::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url('../public/img/background_login.png');
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      filter: blur(5px);
      z-index: -1;
      transform: scale(1.1)
    }

    .card {
      margin-top: 50px;
      background-color: white;
      height: auto;
      width: 800px;
      padding: 13px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      border-radius: 50px;
      box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
    }



    .input-login {
      width: 350px;
      padding: 8px;
      margin: 10px 0;
      border-radius: 20px;
      border: 1px solid #ccc;
      outline: none;
    }

    .botao-login {
      width: 150;
      padding: 8px;
      background-color: #f4b400;
      color: black;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }

    .titulo {
      color: #f4b400;
      text-align: center;
      align-self: center;
      
      justify-self: center;
      font-size: 32px;
      padding-bottom: 60px;
      font-weight: 700;
    }

    .campo {
      display: flex;
      flex-direction: column;
      align-items: start;
      justify-content: space-between;
    }

    .links {
      justify-content: center;
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 60px;
      font-size: 11px;
    }

    .links a {
      color: #f4b400;
      text-decoration: none;
    }

    .formulario {
      display: flex;
      flex-direction: row;
      gap: 80px;
    }

    .coluna_esq {
      align-items: start;
    }

    .column_dir {
      align-items: end;
    }
  </style>
</head>

<body>

  <div id="header-auth"></div>

<script>
fetch("../includes/header-auth.html")
  .then(resposta => resposta.text())
  .then(dados => {
    document.getElementById("header-auth").innerHTML = dados;
  });
</script>


  <div class="div_tela_inteira">
    <div class="card">
      <div class="titulo">
        <span><b>CADASTRO</b></span>
      </div>

      <div class="formulario">
        <div class="coluna_esq">
          <div class="campo">
            <label>Nome Fantasia: </label>
            <input type="text" id="email_inserido" class="input-login" />
          </div>

          <div class="campo">
            <label>CNPJ: </label>
            <input type="text" id="senha_inserida" class="input-login" />
          </div>
        </div>

        <div class="coluna_dir">
          <div class="campo">
            <label>Razão Social: </label>
            <input type="email" id="senha_inserida" class="input-login" />
          </div>

          <div class="campo">
            <label>Data de Cadastro: </label>
            <input type="date" id="senha_inserida" class="input-login" />
          </div>
        </div>
      </div>

      <button class="botao-login" onclick="logar()"><b>CADASTRAR</b></button>
      <div class="links">
        <span>Esqueceu a senha? <b>acesse aqui</b></span>
        <span>Já tem login? <b><a href="Login.html">FAÇA LOGIN</a></b></span>
      </div>
    </div>
  </div>
</body>
<script></script>

</html>

<!--

padding - margem interior
margin - margem exterior

gap - distanciamento de diferentes conteudos dentro de uma mesma div

-->

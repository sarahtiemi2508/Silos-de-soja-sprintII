<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login</title>
</head>
<style>
	/* API da fonte de títulos Inter */
	@import url('https://fonts.googleapis.com/css2?&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

	/* API da fonte padrão Montserrat */
	@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap');

	:root {
    	--primary-yellow: #FFBA00;
    	--second-green: #00352A;
    	--paragrafo: 'Montserrat', sans-serif;
    	--titulo: 'Inter', sans-serif;
	}

	* {
		padding: 0%;
		box-sizing: border-box;
		margin: 0%;
	}

	body {
		font-family: var(--paragrafo);
	}

	.div_tela_inteira {
		position: relative;
		width: 100%;
		min-height: 100vh;
		display: flex;
		justify-content: center;
		align-items: center;
		overflow: hidden;
	}

	.div_tela_inteira:before {
		content: "";
		position: absolute;
		inset: 0;
		background-image: url('../public/img/background_login.png');
		background-position: center;
		background-repeat: no-repeat;
		background-size: cover;
		filter: blur(5px);
		z-index: -1;
		transform: scale(1.1);
	}

	.card {
		margin-top: 4%;
		background-color: white;
		height: 70vh;
		width: 45vw;
		padding: 2%;
		display: flex;
		justify-content: center;
		align-items: center;
		flex-direction: column;
		border-radius: 8%;
		box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
		gap: 8%;
	}

	.input-login {
		width: 30vw;
		height: 5vh;
		padding: 2%;

		border-radius: 20px;
		border: 1px solid #ccc;

		outline: none;
	}

	.botao-login {
		font-family: 'Inter', sans-serif;
		width: 8vw;
		padding: 2%;
		background-color: #f4b400;
		color: black;
		border: none;
		border-radius: 10vw;
		font-weight: 700;
		cursor: pointer;
		transition: all ease-in-out 0.3s;
	}

	.botao-login:hover {
		transform: scale(0.95);
		color: var(--primary-yellow);
		background-color: black;
		cursor: pointer;
	}

	.botao-login:active {
		transform: scale(1);
		color: black;
		background-color: var(--primary-yellow);
		cursor: pointer;
	}

	.titulo {
		color: #f4b400;
		text-align: center;
		align-self: center;
		justify-self: center;
		font-size: 200%;
		padding: 0px 0px 5% 0px;
		font-weight: 700;
		font-family: var(--titulo);
	}

	.campo {
		display: flex;
		flex-direction: column;
		align-items: start;
		justify-content: space-between;
	}

	.links {
		justify-content: center;
		align-items: center;
		display: flex;
		flex-direction: column;
		gap: 10px;
		font-size: 16px;
	}

	.links a {
		color: #f4b400;
		text-decoration: none;
		font-weight: 800;
		transition: all ease-in-out 0.3s;
	}

	.links a:hover {
		color: var(--second-green);
	}

	.formulario {
		display: flex;
		flex-direction: column;
		justify-content: center;
		gap: 5%;
	}
</style>

<body>

	<div id="header-auth"></div>

	<script>
		fetch("../includes/header-auth.html")
			.then(resposta => resposta.text())
			.then(dados => {
				document.getElementById("header-auth").innerHTML = dados;
			});
	</script>

	<div class="div_tela_inteira">
		<div class="card">
			<div class="titulo">
				<span><b>LOGIN</b></span>
			</div>
			<div class="formulario">
				<div class="campo">
					<label>Email: </label>
					<input type="email" id="email_inserido" class="input-login"/>
				</div>
				<div class="campo">
					<label>Senha: </label>
					<input type="password" id="senha_inserida" class="input-login"/>
				</div>
			</div>
			<button class="botao-login" onclick="logar()"><b>ENTRAR</b></button>
			<div class="links">
				<span>Esqueceu a senha? <b>acesse aqui</b></span>
				<span>Não tem cadastro? <b><a href="Cadastro_etapa1.html">CADASTRE-SE AQUI</a></b></span>
			</div>
		</div>
	</div>
</body>
<script>
	function logar() {

		let email = email_inserido.value
		let senha = senha_inserida.value

		if (email == "" || senha == "") {
			alert("Uma das informações necessárias está vazia. Verifique os campos.");
			return;
		}


		let usuarios = [
			{ email: "fernandobrandao@gmail.com", senha: "pesquiseeinove" },
			{ email: "juliaararipe@gmail.com", senha: "pesquiseeinove" },
			{ email: "ceresADMS", senha: "admin" }
		];

		let loginValido = false;


		for (let i = 0; i < usuarios.length; i++) {

			if (
				email === usuarios[i].email &&
				senha === usuarios[i].senha
			) {
				loginValido = true;
				break; // para o loop quando encontra
			}

		}


		if (loginValido) {
			alert("Login realizado com sucesso!");
			window.location.href = "../dashboard-alerta.html";
		} else {
			alert("Email ou senha inválidos!");
		}
	}
</script>

</html>


<!--

padding - margem interior
margin - margem exterior

gap - distanciamento de diferentes conteudos dentro de uma mesma div

-->

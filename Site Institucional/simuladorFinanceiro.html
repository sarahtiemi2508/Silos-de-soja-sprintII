<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/Site Institucional/public/img/favicon-dark.ico" media="(prefers-color-scheme: dark)">
    <link rel="shortcut icon" href="/Site Institucional/public/img/favicon-light.ico" media="(prefers-color-scheme: light)">
    <title>Simulador Financeiro</title>
    <link rel="stylesheet" href="public/css/calculadora-financeira.css">
</head>
<body>
     
<div id="header-simulador"></div>

<script>
fetch("includes/header-simulador.html")
  .then(resposta => resposta.text())
  .then(dados => {
    document.getElementById("header-simulador").innerHTML = dados;
  });
</script>


    <div class="container-financeiro">
        <div class="circulo-fundo1"></div>
         <div class="circulo-fundo2"></div>
          <div class="circulo-fundo3"></div>
          <div class="form-simulador-financeiro font-geral">
            <p>Simulação Financeira</p>
            <h1>Veja o Impacto do Monitoramento no Seu Lucro</h1>

            <div class="ipt-simulador-financeiro">
                <input type="text" placeholder="Volume do seu silo em m³">
                <input type="text" placeholder="Peso Hectolítrico(PH)">
                <input type="text" placeholder="Preço Atual da saca (R$)">
                <input type="text" placeholder="Preço Futuro da saca (R$)">
            </div>
            <button onclick="">CALCULAR</button>
        </div>
    </div>


</body>
</html>

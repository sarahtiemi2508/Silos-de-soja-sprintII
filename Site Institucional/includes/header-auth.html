<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>
        * {
            padding: 0;
            box-sizing: border-box;
            margin: 0;
        }

        .header {
            background-color: rgb(0, 0, 0, 0.7);
            width: 100%;
            height: 65px;
            position: fixed;
            z-index: 10;
          
        }

        .container-header{
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0px 40px;
        }

        .container-header button{
            width: 30px;
            height: 30px;
            border-radius: 100px;
            color: #FFBA00;
            font-size: 25px;
            background-color: rgb(0, 0, 0, 0);
            border-color: #FFBA00;
            border: 2px solid;
        }
        .container-header img{
            width: 50px;
            height: 40px;
        }
        .container-header div{
            width: 50px;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container-header">
            <button onclick="history.back()"><</button>
            <img src="../public/img/logoCeres.png" alt="">
            <div>   </div>
        </div>

    </header>
</body>

</html>
